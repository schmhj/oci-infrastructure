name: "Terraform Manual Destroy"

on:
  workflow_dispatch:
    inputs:
      cluster_id:
        description: 'Target Cluster ID for verification'
        required: true
        type: string
      allow_destroy:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

jobs:
  # ============================================================
  # Job 1: Destroy K8s Resources First
  # ============================================================
  destroy-k8s:
    name: "Destroy K8s Workloads"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Confirmation Check
        run: |
          if [ "${{ github.event.inputs.allow_destroy }}" != "DESTROY" ]; then
            echo "Error: Confirmation string 'DESTROY' was not provided correctly."
            exit 1
          fi

      - name: Create Auto-Vars File
        run: |
          echo 'k8s_token = "${{ secrets.K8S_CLUSTER_TOKEN }}"' > k8s/secrets.auto.tfvars

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var="cluster_id=${{ github.event.inputs.cluster_id }}"
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

  # ============================================================
  # Job 2: Destroy OCI Infrastructure Second
  # ============================================================
  destroy-oci:
    name: "Destroy OCI Infra"
    needs: destroy-k8s # <--- Ensures K8s is gone before touching OCI
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false -var="cluster_id=${{ github.event.inputs.cluster_id }}"
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}