name: "Terraform Manual Destroy"

on:
  workflow_dispatch:
    inputs:
      directory:
        description: 'Which directory to destroy?'
        required: true
        type: choice
        options:
          - infra
          - k8s
      cluster_id:
        description: 'Target Cluster ID for verification'
        required: true
        type: string
      allow_destroy:
        description: 'Type "DESTROY" to confirm'
        required: true
        type: string

jobs:
  terraform-destroy:
    name: "Destroy Resource"
    # Ensure this only runs on the main branch
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Manual Confirmation Check
        run: |
          if [ "${{ github.event.inputs.allow_destroy }}" != "DESTROY" ]; then
            echo "Error: Confirmation string 'DESTROY' was not provided correctly."
            exit 1
          fi
          echo "Destroying resources for Cluster: ${{ github.event.inputs.cluster_id }}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ github.event.inputs.directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Destroy
        # We pass the cluster_id as a variable in case your TF code uses it
        run: terraform destroy -auto-approve -input=false -var="cluster_id=${{ github.event.inputs.cluster_id }}"
        working-directory: ${{ github.event.inputs.directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}