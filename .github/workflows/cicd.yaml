name: OKE Cluster Deploy Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
      - 'scripts/**'
  push:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_and_apply

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # Job 1: OCI Infrastructure (VCN, OKE, etc.)
  # ============================================================
  oci:
    name: "OCI Provisioning"
    runs-on: ubuntu-latest
    outputs:
      cluster_id: ${{ steps.get_cluster_id.outputs.cluster_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in oci
        id: filter
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_INPUT_ACTION: ${{ github.event.inputs.action }}
        run: |
          CHANGED=false
          if git diff --name-only HEAD^ HEAD | grep -q "^oci/"; then
            CHANGED=true
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

          RUN_PLAN=false
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$CHANGED" = "true" ]; then
            RUN_PLAN=true
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && { [ "$WORKFLOW_INPUT_ACTION" = "plan" ] || [ "$WORKFLOW_INPUT_ACTION" = "plan_and_apply" ]; }; then
            RUN_PLAN=true
          fi
          echo "run_plan=$RUN_PLAN" >> $GITHUB_OUTPUT

          RUN_APPLY=false
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$CHANGED" = "true" ]; then
            RUN_APPLY=true
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && { [ "$WORKFLOW_INPUT_ACTION" = "apply" ] || [ "$WORKFLOW_INPUT_ACTION" = "plan_and_apply" ]; }; then
            RUN_APPLY=true
          fi
          echo "run_apply=$RUN_APPLY" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        run: terraform init
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        run: terraform plan -no-color -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Apply
        if: steps.filter.outputs.run_apply == 'true'
        run: terraform apply -auto-approve -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
      
      # Capture the output from the Terraform state
      - name: Export Cluster ID
        id: get_cluster_id
        if: |
          steps.filter.outputs.run_apply == 'true' || 
            steps.filter.outputs.run_plan == 'true'
        run: |
          # 'terraform output -raw' extracts the value without quotes
          ID=$(terraform output -raw cluster_id)
          echo "cluster_id=$ID" >> $GITHUB_OUTPUT
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

  
  # ============================================================
  # Job 2: SA and Secret Script (The "Glue" Job)
  # ============================================================
  setup-sa-secrets:
    name: "Setup SA and Secrets"
    needs: oci
    runs-on: ubuntu-latest
    # Run if oci changed OR if manually triggered
    if: | 
      always() && 
      needs.oci.result == 'success' &&
      needs.oci.outputs.cluster_id != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI & kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip3 install --upgrade oci-cli

      - name: Setup OCI credentials
        env:
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ vars.OCI_REGION }}
          DEFAULT_REGION: ${{ vars.OCI_DEFAULT_REGION }}
        run: |
          mkdir -p ~/.oci
          # Prefer OCI_REGION secret, fallback to DEFAULT_REGION
          REGION="${OCI_REGION:-$DEFAULT_REGION}"

          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER" "$OCI_FINGERPRINT" "$OCI_TENANCY" "$REGION" "$HOME/.oci/oci_api_key.pem" \
            > ~/.oci/config

          # Write private key (handle CRLF safely)
          printf '%s' "$OCI_PRIVATE_KEY" | tr -d '\r' > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          oci setup repair-file-permissions --file ~/.oci/config 

      - name: Get Kubeconfig
        run: |
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ needs.oci.outputs.cluster_id }} \
            --file $HOME/.kube/config \
            --region ${{ vars.OCI_REGION }} \
            --token-version 2.0.0 \
            --kube-endpoint PUBLIC_ENDPOINT

      - name: Run SA and Secret Script
        id: run_sa_script
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRET_ADMIN }}
        run: |
          K8S_TOKEN=$(./scripts/setup_sa.sh)
          
          if [ -z "$K8S_TOKEN" ]; then
            echo "Failed to capture token"
            exit 1
          fi

          gh secret set K8S_CLUSTER_TOKEN --body "$K8S_TOKEN" --repo ${{ github.repository }}

  # ============================================================
  # Job 3: K8s Configuration (Deployments, Services, Helm)
  # ============================================================
  k8s:
    name: "K8s Deployment"
    needs: setup-sa-secrets # <--- This enforces the serial sequence
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.setup-sa-secrets.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in k8s
        id: filter
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_INPUT_ACTION: ${{ github.event.inputs.action }}
        run: |
          CHANGED=false
          if git diff --name-only HEAD^ HEAD | grep -q "^k8s/"; then
            CHANGED=true
          fi
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

          RUN_PLAN=false
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$CHANGED" = "true" ]; then
            RUN_PLAN=true
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && { [ "$WORKFLOW_INPUT_ACTION" = "plan" ] || [ "$WORKFLOW_INPUT_ACTION" = "plan_and_apply" ]; }; then
            RUN_PLAN=true
          fi
          echo "run_plan=$RUN_PLAN" >> $GITHUB_OUTPUT

          RUN_APPLY=false
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$CHANGED" = "true" ]; then
            RUN_APPLY=true
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && { [ "$WORKFLOW_INPUT_ACTION" = "apply" ] || [ "$WORKFLOW_INPUT_ACTION" = "plan_and_apply" ]; }; then
            RUN_APPLY=true
          fi
          echo "run_apply=$RUN_APPLY" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Create Auto-Vars File
        run: |
          echo " {{ secrets.K8S_CLUSTER_TOKEN }}"
          echo 'k8s_token="${{ secrets.K8S_CLUSTER_TOKEN }}"' > k8s/secrets.auto.tfvars

      - name: Terraform Init
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        run: terraform init
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        run: terraform plan -no-color -input=false
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Apply
        if: steps.filter.outputs.run_apply == 'true'
        run: terraform apply -auto-approve -input=false
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
          