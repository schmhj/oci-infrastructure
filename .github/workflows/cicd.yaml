name: OKE Cluster Deploy Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
      - 'scripts/**'
  push:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_and_apply

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # Job 1: OCI Infrastructure (VCN, OKE, etc.)
  # ============================================================
  oci:
    name: "OCI Provisioning"
    runs-on: ubuntu-latest
    outputs:
      cluster_id: ${{ steps.get_cluster_id.outputs.cluster_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in oci
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^oci/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'pull_request') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'plan' || inputs.action == 'plan_and_apply'))
        run: terraform plan -no-color -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Apply
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'apply' || inputs.action == 'plan_and_apply'))
        run: terraform apply -auto-approve -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
      
      # Capture the output from the Terraform state
      - name: Export Cluster ID
        id: get_cluster_id
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'apply' || inputs.action == 'plan_and_apply'))
        run: |
          # 'terraform output -raw' extracts the value without quotes
          ID=$(terraform output -raw cluster_id)
          echo "cluster_id=$ID" >> $GITHUB_OUTPUT
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

  
  # ============================================================
  # Job 2: SA and Secret Script (The "Glue" Job)
  # ============================================================
  setup-sa-secrets:
    name: "Setup SA and Secrets"
    needs: oci
    runs-on: ubuntu-latest
    outputs:
      k8s_token: ${{ steps.run_sa_script.outputs.k8s_token }}
    # Run if oci changed OR if manually triggered
    if: | 
      always() && 
      needs.oci.result == 'success' &&
      needs.oci.outputs.cluster_id != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI & kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip3 install --upgrade oci-cli

      - name: Configure OCI CLI from secrets
        env:
          OCI_TENANCY: ${{ secrets.OCI_TENANCY }}
          OCI_USER: ${{ secrets.OCI_USER }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          echo "tenancy=${OCI_TENANCY}" > ~/.oci/config
          echo "user=${OCI_USER}" >> ~/.oci/config
          echo "fingerprint=${OCI_FINGERPRINT}" >> ~/.oci/config
          echo "key_file=~/.oci/key.pem" >> ~/.oci/config
          printf '%s' "${OCI_PRIVATE_KEY}" | tr -d '\r' > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem

      - name: Get Kubeconfig
        run: |
          oci ce cluster create-kubeconfig \
            --cluster-id ${{ needs.oci.outputs.cluster_id }} \
            --file $HOME/.kube/config \
            --region ${{ vars.OCI_REGION }} \
            --token-version 2.0.0

      - name: Run SA and Secret Script
        id: run_sa_script
        run: |
          chmod +x ./scripts/setup-sa.sh
          ./scripts/setup-sa.sh
          echo "k8s_token=$K8S_TOKEN" >> $GITHUB_OUTPUT
        env:
          KUBECONFIG: $HOME/.kube/config        

  # ============================================================
  # Job 3: K8s Configuration (Deployments, Services, Helm)
  # ============================================================
  k8s:
    name: "K8s Deployment"
    needs: setup-sa-secrets # <--- This enforces the serial sequence
    runs-on: ubuntu-latest
    if: | 
      always() && 
      needs.setup-sa-secrets.result == 'success' &&
      needs.setup-sa-secrets.outputs.k8s_token != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in k8s
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^k8s/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'pull_request') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'plan' || inputs.action == 'plan_and_apply'))
        run: terraform plan -no-color -input=false
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
          TF_VAR_k8s_token: ${{ needs.setup-sa-secrets.outputs.k8s_token }}

      - name: Terraform Apply
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'apply' || inputs.action == 'plan_and_apply'))
        run: terraform apply -auto-approve -input=false
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
          TF_VAR_k8s_token: ${{ needs.setup-sa-secrets.outputs.k8s_token }}