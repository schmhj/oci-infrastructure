name: OKE Cluster Deploy Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
  push:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_and_apply

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # Job 1: OCI Infrastructure (VCN, OKE, etc.)
  # ============================================================
  oci:
    name: "OCI Provisioning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in oci
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^oci/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'pull_request') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'plan' || inputs.action == 'plan_and_apply'))
        run: terraform plan -no-color -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Apply
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'apply' || inputs.action == 'plan_and_apply'))
        run: terraform apply -auto-approve -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

  # ============================================================
  # Job 2: K8s Configuration (Deployments, Services, Helm)
  # ============================================================
  k8s:
    name: "K8s Deployment"
    needs: oci # <--- This enforces the serial sequence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in k8s
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^k8s/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'pull_request') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'plan' || inputs.action == 'plan_and_apply'))
        run: terraform plan -no-color -input=false
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Apply
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'push') ||
          (github.event_name == 'workflow_dispatch' && (inputs.action == 'apply' || inputs.action == 'plan_and_apply'))
        run: terraform apply -auto-approve -input=false
        working-directory: k8s
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}