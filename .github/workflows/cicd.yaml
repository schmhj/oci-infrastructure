name: OKE Cluster Deploy Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
      - '.github/scripts/**'
      - '.github/config.sh'
      - '.github/workflows/cicd.yaml'
  push:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
      - '.github/scripts/**'
      - '.github/config.sh'
      - '.github/workflows/cicd.yaml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_and_apply

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: oci-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # Job 1: OCI Infrastructure (VCN, OKE, etc.)
  # ============================================================
  oci:
    name: "OCI Provisioning"
    runs-on: ubuntu-latest
    outputs:
      cluster_id: ${{ steps.get_cluster_id.outputs.cluster_id }}
      nlb_public_ip: ${{ steps.get_cluster_id.outputs.nlb_public_ip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for changes in oci
        id: filter
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_INPUT_ACTION: ${{ github.event.inputs.action }}
        run: |
          chmod +x ./.github/scripts/check_changes.sh
          ./.github/scripts/check_changes.sh oci

      - name: Setup Terraform
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        run: terraform init
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          steps.filter.outputs.run_plan == 'true' || 
          steps.filter.outputs.run_apply == 'true'
        run: terraform plan -no-color -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Apply
        if: steps.filter.outputs.run_apply == 'true'
        run: terraform apply -auto-approve -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
      
      - name: Export Cluster ID
        id: get_cluster_id
        if: steps.filter.outputs.run_apply == 'true'
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          NLB_PUBLIC_IP=$(terraform output -raw nlb_public_ip)
          echo "cluster_id=$CLUSTER_ID" >> $GITHUB_OUTPUT
          echo "nlb_public_ip=$NLB_PUBLIC_IP" >> $GITHUB_OUTPUT
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Save Terraform Plan (OCI)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-terraform-plan-${{ github.run_number }}
          path: oci/terraform.tfplan
          retention-days: 7
          if-no-files-found: ignore

      - name: Job Summary
        if: always()
        run: |
          echo "## OCI Provisioning Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster ID**: ${{ steps.get_cluster_id.outputs.cluster_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **NLB IP**: ${{ steps.get_cluster_id.outputs.nlb_public_ip }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # Job 2: OCI and Kubernetes Configuration
  # ============================================================
  setup-oci-k8s:
    name: "Setup OCI and Kubernetes Configuration"
    needs: oci
    runs-on: ubuntu-latest
    if: | 
      always() && 
      needs.oci.result == 'success' &&
      needs.oci.outputs.cluster_id != '' &&
      needs.oci.outputs.nlb_public_ip != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OCI CLI & kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip3 install --upgrade oci-cli

      - name: Setup OCI credentials
        env:
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ vars.OCI_REGION }}
          DEFAULT_REGION: ${{ vars.OCI_DEFAULT_REGION }}
        run: |
          chmod +x ./.github/scripts/setup_oci_credentials.sh
          ./.github/scripts/setup_oci_credentials.sh

      - name: Generate Kubeconfig
        env:
          CLUSTER_ID: ${{ needs.oci.outputs.cluster_id }}
          REGION: ${{ vars.OCI_REGION }}
        run: |
          chmod +x ./.github/scripts/kubeconfig.sh
          ./.github/scripts/kubeconfig.sh

      - name: Setup TLS Secret
        env:
          SECRETS_PRIVATE_KEY: ${{ secrets.TLS_KEY_PEM }}
          SECRETS_PUBLIC_KEY: ${{ secrets.TLS_CERT_PEM }}
        run: |
          chmod +x ./.github/scripts/configure_tls_secret.sh
          ./.github/scripts/configure_tls_secret.sh

      - name : Install ArgoCD and Kubeseal Sealed Secrets
        run: |
          chmod +x ./.github/scripts/install.sh
          ./.github/scripts/install.sh

      - name: Start Argocd
        run: |
          chmod +x ./.github/scripts/argocd_start.sh
          ./.github/scripts/argocd_start.sh

      - name: Update ArgoCD Initial Admin Password
        env:
          NLB_PUBLIC_IP: ${{ needs.oci.outputs.nlb_public_ip }}
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
        id: update_argocd_password
        run: |
          chmod +x ./.github/scripts/argocd_updatepwd.sh
          ./.github/scripts/argocd_updatepwd.sh

      - name : Argocd Configuration
        run: |
          chmod +x ./.github/scripts/argocd_sa_config.sh
          ./.github/scripts/argocd_sa_config.sh

      - name: K8s Setup Summary
        if: success()
        run: |
          echo "## Kubernetes Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ ArgoCD deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "✅ K8s RBAC configured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Access ArgoCD at: \`https://${{ needs.oci.outputs.nlb_public_ip }}:30443\`" >> $GITHUB_STEP_SUMMARY
  