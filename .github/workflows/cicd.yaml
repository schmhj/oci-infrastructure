name: OKE Cluster Deploy Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
  push:
    branches:
      - main
    paths:
      - 'oci/**'
      - 'k8s/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action to run'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - plan_and_apply

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # Terraform — runs on pull_request and push to main branch
  # ============================================================
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest
    strategy:
      # This runs separate jobs for oci and k8s folders independently
      matrix:
        directory: [oci, k8s]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Check for changes in ${{ matrix.directory }}
        id: filter
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^${{ matrix.directory }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ matrix.directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'pull_request') ||
          (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' &&
           (inputs.action == 'plan' || inputs.action == 'plan_and_apply'))
        run: terraform plan -no-color -input=false
        working-directory: ${{ matrix.directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Apply
        if: |
          (steps.filter.outputs.changed == 'true' && github.event_name == 'push') ||
          (github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' &&
           (inputs.action == 'apply' || inputs.action == 'plan_and_apply'))
        run: terraform apply -auto-approve -input=false
        working-directory: ${{ matrix.directory }}
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
