name: Direct OKE Cluster Destroy Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oci-destroy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # Job 2: Destroy OCI infrastructure via Terraform
  # ============================================================
  oci-destroy:
    name: "Destroy OCI Cluster"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Plan Destroy
        run: terraform plan -destroy -no-color -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Destroy
        run: terraform destroy -auto-approve -input=false
        working-directory: oci
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: OCI Destroy Summary
        if: always()
        run: |
          echo "## OCI Destroy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster ID**: ${{ github.event.inputs.cluster_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY